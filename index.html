<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazarHub Шу</title>
    <style>
        :root { --primary: #002f34; --accent: #00e0ff; --bg: #f2f4f5; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); }
        header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-post { background: var(--accent); border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 15px; }
        .ad-card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .ad-img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }
        .wa-btn { display: block; text-align: center; background: #25d366; color: white; text-decoration: none; padding: 8px; border-radius: 5px; margin-top: 10px; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; width: 80%; border-radius: 10px; }
        input, textarea { width: 100%; margin: 5px 0 15px 0; padding: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <strong>BazarHub Шу</strong>
    <button class="btn-post" onclick="document.getElementById('modal').style.display='flex'">+ Подать</button>
</header>

<div class="ads-grid" id="adsContainer"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Новое объявление</h3>
        <input type="text" id="title" placeholder="Название">
        <input type="text" id="price" placeholder="Цена (тг)">
        <textarea id="desc" placeholder="Описание"></textarea>
        <button onclick="saveAd()">Опубликовать</button>
        <button onclick="document.getElementById('modal').style.display='none'">Закрыть</button>
    </div>
</div>

<script>
    let ads = [
        {id: 1, title: "iPhone 13", price: "250 000 ₸", desc: "В идеале", phone: "77071234567", img: "https://picsum.photos/200"},
        {id: 2, title: "Аренда авто", price: "15 000 ₸", desc: "На сутки", phone: "77071234567", img: "https://picsum.photos/201"}
    ];

    function renderAds() {
        const container = document.getElementById('adsContainer');
        container.innerHTML = ads.map(ad => `
            <div class="ad-card">
                <img src="${ad.img}" class="ad-img">
                <h4>${ad.title}</h4>
                <p>${ad.price}</p>
                <a href="https://wa.me/${ad.phone}?text=Здравствуйте, по объявлению: ${ad.title}" class="wa-btn">WhatsApp</a>
            </div>
        `).join('');
    }

    function saveAd() {
        const newAd = {
            id: Date.now(),
            title: document.getElementById('title').value,
            price: document.getElementById('price').value + ' ₸',
            desc: document.getElementById('desc').value,
            img: "https://picsum.photos/200",
            phone: "77071234567"
        };
        ads.unshift(newAd);
        renderAds();
        document.getElementById('modal').style.display = 'none';
    }

    renderAds();
</script>
</body>
</html>
