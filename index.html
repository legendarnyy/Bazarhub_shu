<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BazarHub Шу | Маркетплейс</title>
    <style>
        :root { --main: #002f34; --accent: #00e0ff; --bg: #f2f4f5; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; }
        header { background: var(--main); color: white; padding: 20px; text-align: center; font-weight: 800; font-size: 24px; }
        .search-bar { padding: 15px; background: white; }
        #search { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card-body { padding: 10px; }
        .price { color: #d93025; font-weight: 800; font-size: 16px; margin-top: 5px; }

        /* Экран объявления */
        #detail-view { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; overflow-y:auto; padding: 20px; }
    </style>
</head>
<body>

<header>BazarHub <span style="color:var(--accent)">Шу</span></header>
<div class="search-bar"><input type="text" id="search" placeholder="Поиск по объявлениям..."></div>
<div class="grid" id="container">Загрузка данных...</div>

<!-- Страница детального просмотра -->
<div id="detail-view">
    <button onclick="hideDetail()" style="padding:10px; border:none; background:#eee; border-radius:5px;">← Назад</button>
    <div id="detail-content" style="margin-top:20px;"></div>
</div>

<script>
    let ads = [];
    async function loadData() {
        try {
            const res = await fetch('data.json');
            ads = await res.json();
            render(ads);
        } catch(e) { document.getElementById('container').innerText = "Ошибка загрузки"; }
    }

    function render(list) {
        document.getElementById('container').innerHTML = list.map((ad, i) => `
            <div class="card" onclick="showDetail(${i})">
                <img src="${ad.img}" onerror="this.src='https://via.placeholder.com/200'">
                <div class="card-body">
                    <h4 style="margin:0;">${ad.title}</h4>
                    <p class="price">${ad.price}</p>
                </div>
            </div>
        `).join('');
    }

    function showDetail(i) {
        const ad = ads[i];
        document.getElementById('detail-content').innerHTML = `
            <img src="${ad.img}" style="width:100%; border-radius:10px;">
            <h1 style="margin:20px 0;">${ad.title}</h1>
            <p style="font-size:20px; color:red;">${ad.price}</p>
            <p style="margin-top:20px; line-height:1.6;">Это объявление загружено с площадки Krisha.kz. Свяжитесь с продавцом напрямую через WhatsApp или по номеру телефона на официальном сайте.</p>
        `;
        document.getElementById('detail-view').style.display = 'block';
    }

    function hideDetail() { document.getElementById('detail-view').style.display = 'none'; }

    document.getElementById('search').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        render(ads.filter(a => a.title.toLowerCase().includes(val)));
    };

    loadData();
</script>
</body>
</html>
