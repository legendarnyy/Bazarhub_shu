<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazarHub Шу | Маркетплейс №1</title>
    <style>
        :root { --primary: #002f34; --accent: #00e0ff; --bg: #f7f9fa; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        
        /* SHADOWS & CARDS */
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .search-container { padding: 20px; max-width: 800px; margin: auto; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; }
        
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; border: 1px solid #eee; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 15px; }
        .price { color: #d93025; font-size: 20px; font-weight: 800; margin-top: 10px; }
        
        footer { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>

<div class="header">
    <h1>BazarHub Шу</h1>
    <p>Твой местный маркетплейс</p>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Что ищем сегодня?">
</div>

<div class="main-grid" id="adsContainer">Загрузка объявлений...</div>

<footer>
    <p>© 2026 BazarHub Шу. Все права защищены.</p>
</footer>

<script>
    let allAds = [];

    async function fetchData() {
        const res = await fetch('data.json');
        allAds = await res.json();
        renderAds(allAds);
    }

    function renderAds(data) {
        const container = document.getElementById('adsContainer');
        container.innerHTML = data.map(ad => `
            <div class="card">
                <img src="${ad.img}" onerror="this.src='https://via.placeholder.com/400'">
                <div class="card-info">
                    <h3 style="margin:0;">${ad.title}</h3>
                    <div class="price">${ad.price}</div>
                    <button style="width:100%; margin-top:10px; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px;">Открыть</button>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const filtered = allAds.filter(ad => ad.title.toLowerCase().includes(e.target.value.toLowerCase()));
        renderAds(filtered);
    });

    fetchData();
</script>
</body>
</html>
