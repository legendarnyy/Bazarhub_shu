<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazarHub Шу</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #002f34; --accent: #00e0ff; --bg: #f2f4f5; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); padding-bottom: 70px; }
        header { background: var(--primary); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 800; }
        .logo span { color: var(--accent); }
        .nav-tabs { display: flex; background: white; padding: 10px; gap: 10px; overflow-x: auto; border-bottom: 1px solid #ddd; }
        .tab { padding: 8px 15px; border-radius: 20px; background: #eee; cursor: pointer; white-space: nowrap; font-size: 13px; }
        .tab.active { background: var(--primary); color: white; }
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 15px; }
        .ad-card { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .img-box { width: 100%; height: 100px; background: #ddd; border-radius: 5px; margin-bottom: 8px; }
        .btn-wa { display: block; background: #25d366; color: white; text-align: center; padding: 8px; border-radius: 5px; text-decoration: none; font-size: 12px; font-weight: bold; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #ddd; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; width: 90%; border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">Bazar<span>Hub</span></div>
    <button onclick="document.getElementById('modal').style.display='flex'" style="background:var(--accent); border:none; padding:8px 15px; border-radius:20px; font-weight:bold;">+ Подать</button>
</header>

<div class="nav-tabs" id="categoryNav"></div>

<div class="ads-grid" id="adsContainer"></div>

<div class="bottom-nav">
    <div onclick="alert('Главная')">🏠 Главная</div>
    <div onclick="alert('Личный кабинет: Мои объявления')">👤 Кабинет</div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Новое объявление</h3>
        <input type="text" id="title" placeholder="Название" style="width:100%; margin:10px 0; padding:10px;">
        <input type="number" id="price" placeholder="Цена" style="width:100%; margin:10px 0; padding:10px;">
        <button onclick="addAd()" style="width:100%; background:var(--primary); color:white; padding:10px; border:none;">Опубликовать</button>
    </div>
</div>

<script>
    const data = [
        {title: "iPhone 13", cat: "Электроника", sub: "Смартфоны", price: "250 000 ₸", img: "https://picsum.photos/200/200?1"},
        {title: "Велосипед", cat: "Спорт", sub: "Вело", price: "45 000 ₸", img: "https://picsum.photos/200/200?2"}
    ];

    function render(filter = "Все") {
        const container = document.getElementById('adsContainer');
        const filtered = filter === "Все" ? data : data.filter(i => i.cat === filter);
        container.innerHTML = filtered.map(ad => `
            <div class="ad-card">
                <div class="img-box" style="background-image:url(${ad.img}); background-size:cover;"></div>
                <h4 style="font-size:13px;">${ad.title}</h4>
                <p style="color:red; font-weight:bold; margin:5px 0;">${ad.price}</p>
                <a href="#" class="btn-wa">WhatsApp</a>
            </div>
        `).join('');
    }

    const cats = ["Все", "Электроника", "Спорт", "Транспорт"];
    document.getElementById('categoryNav').innerHTML = cats.map(c => `<div class="tab" onclick="render('${c}')">${c}</div>`).join('');
    
    function addAd() {
        data.unshift({title: document.getElementById('title').value, price: document.getElementById('price').value + ' ₸', cat: "Электроника", img: "https://picsum.photos/200"});
        document.getElementById('modal').style.display = 'none';
        render();
    }
    render();
</script>
</body>
</html>
