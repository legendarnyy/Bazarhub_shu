<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BazarHub Шу — Доска объявлений</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #002f34; --accent: #00e0ff; --bg: #f2f4f5; --white: #ffffff; --whatsapp: #25d366; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); padding-bottom: 70px; }
        
        /* ШАПКА И ЛОГО */
        header { background: var(--primary); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 800; cursor: pointer; }
        .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 18px; }
        .btn-post { background: var(--accent); border: none; padding: 8px 16px; border-radius: 20px; font-weight: 800; font-size: 13px; color: var(--primary); }

        /* НАВИГАЦИЯ */
        .nav-section { background: white; padding: 10px; border-bottom: 1px solid #ddd; }
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .tab { padding: 6px 14px; border-radius: 20px; background: #eee; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .tab.active { background: var(--primary); color: white; }

        /* СЕТКА */
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 15px; }
        .ad-card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .ad-img { width: 100%; height: 100px; background: #eee; border-radius: 8px; object-fit: cover; }
        .btn-wa { display: block; background: var(--whatsapp); color: white; text-align: center; padding: 8px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: 800; margin-top: 10px; }

        /* НИЖНЕЕ МЕНЮ */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #ddd; font-size: 12px; font-weight: 600; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; width: 90%; max-width: 400px; border-radius: 15px; }
    </style>
</head>
<body>

<header>
    <div class="logo"><div class="logo-icon">B</div> Bazar<span>Hub</span></div>
    <button class="btn-post" onclick="document.getElementById('modal').style.display='flex'">+ Подать</button>
</header>

<div class="nav-section">
    <div class="tabs" id="categoryNav"></div>
</div>

<div class="ads-grid" id="adsContainer"></div>

<div class="bottom-nav">
    <div onclick="render('Все')">🏠 Лента</div>
    <div onclick="alert('Личный кабинет: Ваши объявления и настройки')">👤 Кабинет</div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Новое объявление</h3>
        <input type="text" id="title" placeholder="Название товара" style="width:100%; margin:10px 0; padding:10px;">
        <input type="text" id="price" placeholder="Цена (тг)" style="width:100%; margin:10px 0; padding:10px;">
        <button onclick="addAd()" style="width:100%; background:var(--primary); color:white; padding:12px; border:none; border-radius:8px; font-weight:800;">Опубликовать</button>
        <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; margin-top:10px; border:none; background:none;">Закрыть</button>
    </div>
</div>

<script>
    // Инициализация базы данных в памяти
    let ads = JSON.parse(localStorage.getItem('bazar_ads')) || [
        {title: "iPhone 13 Pro", cat: "Электроника", price: "250 000 ₸", img: "https://picsum.photos/200"},
        {title: "Аренда авто", cat: "Транспорт", price: "15 000 ₸", img: "https://picsum.photos/201"}
    ];

    const cats = ["Все", "Электроника", "Транспорт", "Услуги", "Дом"];

    function render(filter = "Все") {
        const container = document.getElementById('adsContainer');
        const filtered = filter === "Все" ? ads : ads.filter(a => a.cat === filter);
        
        container.innerHTML = filtered.map(ad => `
            <div class="ad-card">
                <img src="${ad.img}" class="ad-img">
                <h4 style="font-size:13px; margin:8px 0;">${ad.title}</h4>
                <p style="color:red; font-weight:800;">${ad.price}</p>
                <a href="#" class="btn-wa">WhatsApp</a>
            </div>
        `).join('');
    }

    function addAd() {
        const newAd = {
            title: document.getElementById('title').value,
            cat: "Электроника", // Можно расширить форму до выбора категории
            price: document.getElementById('price').value + ' ₸',
            img: "https://picsum.photos/200?random=" + Date.now()
        };
        ads.unshift(newAd);
        localStorage.setItem('bazar_ads', JSON.stringify(ads));
        document.getElementById('modal').style.display = 'none';
        render();
    }

    // Рендер категорий
    document.getElementById('categoryNav').innerHTML = cats.map(c => 
        `<div class="tab" onclick="render('${c}')">${c}</div>`).join('');
    
    render();
</script>
</body>
</html>
